<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Proxy</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Claude Proxy</h1>
        <nav>
            <button class="tab active" data-tab="pending">Pending</button>
            <button class="tab" data-tab="rules">Rules</button>
        </nav>
    </header>

    <main>
        <section id="pending-view" class="view active">
            <div id="pending-list" class="card-list">
                <p class="empty-state">No pending requests.</p>
            </div>
        </section>

        <section id="rules-view" class="view">
            <div class="add-rule-form">
                <h3>Add Rule</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Type</label>
                        <div class="type-toggle">
                            <button class="type-btn active" data-type="allow">Allow</button>
                            <button class="type-btn" data-type="deny">Deny</button>
                        </div>
                    </div>
                    <div class="form-group-grow">
                        <label>Pattern</label>
                        <div class="add-rule-pattern-row">
                            <select id="add-rule-preset">
                                <option value="custom">Custom regex</option>
                                <option value="subdomain">Subdomain</option>
                                <option value="base_domain">Base domain</option>
                            </select>
                            <input type="text" id="add-rule-input" placeholder="Enter regex pattern...">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Duration</label>
                        <select id="add-rule-duration">
                            <option value="forever">Forever</option>
                            <option value="15min">15 minutes</option>
                            <option value="1hr">1 hour</option>
                            <option value="1day">1 day</option>
                            <option value="1week">1 week</option>
                            <option value="1month">1 month</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>&nbsp;</label>
                        <button class="btn btn-add" id="add-rule-btn">Add</button>
                    </div>
                </div>
            </div>
            <div id="rules-table-wrap">
                <table id="rules-table">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Pattern</th>
                            <th>Label</th>
                            <th>Expires</th>
                            <th>Source</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="rules-body">
                        <tr class="empty-row">
                            <td colspan="6">No rules configured.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="status-bar">
        <span id="ws-status">Connecting...</span>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
